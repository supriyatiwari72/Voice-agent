# Model settings and endpoints mapping for various providers

noise_providers:
  rnnoise:
    model_path: null
    attenuation: -15
  deepfilternet:
    attenuation: -20

vad_providers:
  silero:
    threshold: 0.01
    min_silence_duration_ms: 100
  webrtc:
    aggressiveness: 3

stt_providers:
  whisper:
    model_name: "base"
    language: "en"
  faster_whisper:
    model_size: "tiny"
    device: "cpu"
    compute_type: "int8"
    beam_size: 5
  deepgram:
    model: "nova-2"
    smart_format: true

llm_providers:
  openai:
    model: "gpt-4o-mini"
    temperature: 0.7
    max_tokens: 150
  gemini:
    model: "gemini-1.5-flash"
    temperature: 0.7
    max_output_tokens: 150
  claude:
    model: "claude-3-haiku-20240307"
    temperature: 0.7
    max_tokens: 150

tts_providers:
  elevenlabs:
    model_id: "eleven_monolingual_v1"
    voice_id: "21m00Tcm4TlvDq8ikWAM" # Rachel voice
    stability: 0.5
    similarity_boost: 0.75
  cartesia:
    model_id: "sonic-english"
    voice_id: "2d8f9468-23bc-425b-b9d5-7d52a22216e5"
  piper:
    model_path: "models/en_US-lessac-medium.onnx"
