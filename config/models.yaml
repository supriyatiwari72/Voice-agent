# Model settings and endpoints for all Voice Agent providers
# Each section maps to the provider key in active_providers above.

# ─── Noise Cancellation ────────────────────────────────────────────────────────

noise_providers:
  rnnoise:
    model_path: null
    attenuation: -15
  deepfilternet:
    attenuation: -20

# ─── Voice Activity Detection ──────────────────────────────────────────────────

vad_providers:
  silero:
    threshold: 0.85
    rms_threshold: 0.012
    segment_rms_threshold: 0.005
    max_silence_frames: 167
    min_speech_bytes: 4000
    min_silence_duration_ms: 250
    pad_frames: 5
    barge_in_rms_multiplier: 5.0
  webrtc:
    aggressiveness: 3

# ─── End-of-Speech Endpointing ────────────────────────────────────────────────
eos:
  speech_start_threshold: 0.60
  speech_end_threshold: 0.30
  consecutive_silence_frames: 40
  min_speech_duration_ms: 300.0
  silence_timeout_ms: 1200.0
  barge_in_rms_multiplier: 5.0

# ─── Speech-To-Text ────────────────────────────────────────────────────────────

stt_providers:
  moonshine:
    model_size: "tiny.en"       # Small, fast, low-latency (Faster-Whisper tiny)
    device: "cpu"
    compute_type: "int8"
    beam_size: 1                # Greedy decode for fastest response
    vad_filter: false           # Skip Whisper VAD (Silero handles this upstream)
    language: "en"

  faster_whisper:
    model_size: "tiny"          # tiny | base | small | medium | large-v2
    device: "cpu"
    compute_type: "int8"
    beam_size: 5

  distil_whisper:
    model_size: "distil-small.en"
    device: "cpu"
    compute_type: "int8"
    beam_size: 5

  deepgram:
    api_key: null               # Set DEEPGRAM_API_KEY in .env or here
    model: "nova-2"
    smart_format: true
    language: "en"

  deepgram_streaming:
    api_key: null
    model: "nova-2"
    language: "en"

  assemblyai_streaming:
    api_key: null

# ─── Large Language Models ─────────────────────────────────────────────────────

llm_providers:
  # ── Ollama Local Models ──────────────────────────────────────────────────
  ollama:
    api_base: "http://localhost:11434"
    model_name: "qwen2.5:3b"
    temperature: 0.7
    max_tokens: 200
    timeout_seconds: 120.0
    max_retries: 2

  qwen2.5_1.5b:
    api_base: "http://localhost:11434"
    model_name: "qwen2.5:1.5b"
    temperature: 0.7
    max_tokens: 200
    timeout_seconds: 120.0
    max_retries: 2

  qwen2.5_3b:
    api_base: "http://localhost:11434"
    model_name: "qwen2.5:3b"
    temperature: 0.7
    max_tokens: 200
    timeout_seconds: 120.0
    max_retries: 2

  phi3_mini:
    api_base: "http://localhost:11434"
    model_name: "phi3:mini"
    temperature: 0.7
    max_tokens: 200
    timeout_seconds: 120.0
    max_retries: 2

  # ── API-Based Providers ─────────────────────────────────────────────────────
  groq:
    api_base: "https://api.groq.com/openai/v1"
    model_name: "llama-3.1-8b-instant"
    api_key: null
    temperature: 0.7
    max_tokens: 200
    timeout_seconds: 15.0
    max_retries: 3

  openrouter:
    api_base: "https://openrouter.ai/api/v1"
    model_name: "nvidia/nemotron-nano-9b-v2:free"
    api_key: null
    temperature: 0.7
    max_tokens: 200
    timeout_seconds: 30.0
    max_retries: 3

  # ── Legacy / General OpenAI-Compatible ───────────────────────────────────
  qwen:
    api_base: "http://localhost:11434"
    model_name: "qwen2.5:3b"
    api_key: "dummy-key"
    temperature: 0.7
    max_tokens: 200
    timeout_seconds: 30.0
    max_retries: 3

  openai:
    api_base: "https://api.openai.com"
    model_name: "gpt-4o-mini"
    api_key: null
    temperature: 0.7
    max_tokens: 200

# ─── Text-To-Speech ────────────────────────────────────────────────────────────

tts_providers:
