# Voice-to-Voice AI Agent — Configuration
#
# SWITCH PROVIDERS WITH ONE WORD BELOW. No code changes required.
#
# ─── ONE-WORD PROVIDER SWITCHER ────────────────────────────────────────────────
#
#   noise:      rnnoise | deepfilternet
#   vad:        silero | webrtc
#   stt:        moonshine | faster_whisper | distil_whisper
#   llm:        groq | openrouter 
#   tts:        piper_streaming | kokoro_streaming

active_providers:
  noise: "rnnoise"
  vad: "silero"
  stt: "distil_whisper"
  llm: "groq"
  tts: "piper_streaming"

# Acoustic Echo Cancellation settings
aec:
  provider: "correlation"  # correlation | none

# System prompt injected into each LLM request.
system_prompt: "You are Friday, a helpful and concise voice assistant. Always respond in English. Respond in 3-4 detailed sentences. Do not use markdown, bullet points, or code blocks. Do not introduce yourself unless directly asked. Do not include any internal thoughts, reasoning, or explanations — output only the direct message to be spoken. You have access to memory about the user — use the [User Profile Facts] and [Recent Turns] sections provided to you to remember and reference facts like the user's name, age, or preferences when relevant."

# Audio interface configuration
audio:
  input_device_index: null        # null = system default microphone
  output_device_index: null       # null = system default speakers
  sample_rate: 16000              # 16kHz — required for Silero VAD and Whisper
  output_sample_rate: 24000       # 24kHz — output rate for TTS playback
  channels: 1                     # Mono
  bit_depth: 16                   # 16-bit PCM
  frame_duration_ms: 30           # VAD frame size (30ms)
  chunk_size: 480                 # 16000 * 0.030 = 480 samples per frame
  buffer_max_size: 200            # Max audio chunks held in buffer

# Queue size limits for the worker pipeline
queues:
  audio_queue_size: 200
  speech_queue_size: 100
  transcript_queue_size: 50
  response_queue_size: 50
  tts_queue_size: 50
  playback_queue_size: 50

# Conversation flow
conversation:
  barge_in_enabled: false        # Disabled: mic picks up speaker echo causing false triggers. Use the Interrupt button in the popup instead.
  followup_enabled: false        # Turn off followup prompts to support natural conversational flow
  goodbye_detection: true        # End conversation on "bye" / "goodbye"
  max_silence_before_listen_ms: 700  # Silence detection timeout in ms (approx 700ms silence complete)

# Logging configuration
logging:
  level: "INFO"
  to_console: true
  to_file: true
  file_path: "logs/pipeline.log"

# Memory configuration
memory:
  enabled: true
  max_recent_turns: 10
  max_turns_before_summary: 50
  max_context_chars: 12000
  max_summaries: 10
  persistence_enabled: true
